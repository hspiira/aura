name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.9.21"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Black
        run: uv run black --check .

      - name: isort
        run: uv run isort --check .

      - name: Flake8
        run: uv run flake8 app tests

      - name: Mypy
        run: uv run mypy app

      - name: Test
        run: uv run pytest -m "not requires_db" -v

      - name: pip-audit
        run: uv run pip-audit
